<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일정 추가 · 김서우 ♥ 양은진 결혼식</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #faf9f6;
      color: #4a453e;
      font-family: "Apple SD Gothic Neo", "Noto Serif KR", "Nanum Myeongjo", serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.3em;
      color: #b3a48c;
      text-transform: uppercase;
      margin-bottom: 22px;
    }
    .names {
      font-size: 26px;
      font-weight: 500;
      color: #3a352e;
      margin-bottom: 6px;
    }
    .names .heart { color: #c99a86; margin: 0 6px; }
    .subtitle {
      font-size: 13px;
      color: #a89b86;
      margin-bottom: 30px;
    }
    .info {
      border-top: 1px solid #e7e1d6;
      border-bottom: 1px solid #e7e1d6;
      padding: 22px 12px;
      margin-bottom: 32px;
    }
    .info .date {
      font-size: 17px;
      color: #3a352e;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .info .place {
      font-size: 13px;
      color: #8a806f;
      line-height: 1.6;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 15px 16px;
      margin-bottom: 12px;
      border-radius: 10px;
      font-size: 15px;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }
    .btn:active { opacity: 0.7; }
    .btn-primary {
      background: #b89b74;
      color: #fff;
    }
    .btn-secondary {
      background: #fff;
      color: #6a6154;
      border: 1px solid #ddd4c5;
    }
    .back {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      color: #a89b86;
      text-decoration: none;
    }
    .back:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="eyebrow">일정 추가</div>
      <div class="names">김서우 <span class="heart">♥</span> 양은진</div>
      <div class="subtitle">저희 두 사람의 결혼식에 함께해 주세요</div>

      <div class="info">
        <div class="date">2026. 10. 10 토요일 낮 12시</div>
        <div class="place">앰배서더 서울 풀만 호텔<br>19층 남산룸</div>
      </div>

      <a class="btn btn-primary"
         href="https://calendar.google.com/calendar/render?action=TEMPLATE&amp;text=%EA%B9%80%EC%84%9C%EC%9A%B0%20%E2%99%A5%20%EC%96%91%EC%9D%80%EC%A7%84%20%EA%B2%B0%ED%98%BC%EC%8B%9D&amp;dates=20261010T030000Z/20261010T050000Z&amp;location=%EC%95%B0%EB%B0%B0%EC%84%9C%EB%8D%94%20%EC%84%9C%EC%9A%B8%20%ED%92%80%EB%A7%8C%20%ED%98%B8%ED%85%94%2019%EC%B8%B5%20%EB%82%A8%EC%82%B0%EB%A3%B8%20(%EC%84%9C%EC%9A%B8%20%EC%A4%91%EA%B5%AC%20%EB%8F%99%ED%98%B8%EB%A1%9C%20287)&amp;details=%EA%B9%80%EC%84%9C%EC%9A%B0%20%C2%B7%20%EC%96%91%EC%9D%80%EC%A7%84%EC%9D%98%20%EA%B2%B0%ED%98%BC%EC%8B%9D%EC%97%90%20%EC%B4%88%EB%8C%80%ED%95%A9%EB%8B%88%EB%8B%A4."
         target="_blank" rel="noopener">구글 캘린더에 추가</a>

      <a class="btn btn-secondary" href="wedding.ics">애플 · 기타 캘린더 (.ics)</a>

      <a class="back" href="index.html">← 청첩장으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
